spring:
  application:
    name: cloud-ai
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://ark.cn-beijing.volces.com
      chat:
        options:
          model: doubao-seed-1-8-251228
          temperature: 0.7
          max-tokens: 500
      image:
        options:
          model: doubao-seedream-3-0-t2i-250628
  config:
    import: "classpath:/prompts/chat-prompts.yml"
# AI陪练服务配置
ai-training:
  # 会话超时时间（分钟）
  session-timeout: 30
  # 最大会话数限制
  max-sessions-per-user: 10
  # 测评开关
  evaluation-enabled: true
  # 日志级别
  log-level: INFO



  # 客户画像配置
  profiles:
    config-path: profiles/customer-profiles.json
    cache-enabled: true
    reload-interval: 300 # 5分钟检查一次配置更新

# 本地文件存储配置
lucky:
  cloud:
    file:
      upload-path: ./data/images
